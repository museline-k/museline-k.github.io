<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>museline</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      background: #0f0f12;
      color: #f1ece6;
      line-height: 1.8;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .container {
      width: 90%;
      max-width: 1180px;
      margin: 0 auto;
    }

    header {
      position: relative;
      min-height: 500px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      text-align: center;
      background: #000;
    }

    .hero-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.42;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.05), transparent 45%),
        linear-gradient(to bottom, rgba(0,0,0,0.25), rgba(0,0,0,0.82));
    }

    .hero-content {
      position: relative;
      z-index: 2;
      padding: 20px;
	  margin-top: 200px;
    }

    .hero-content h1 {
      margin: 0;
      font-size: 4.6rem;
      font-weight: 300;
      letter-spacing: 10px;
      text-transform: uppercase;
    }

    .hero-line {
      width: 90px;
      height: 1px;
      background: rgba(255,255,255,0.5);
      margin: 24px auto;
    }

    .hero-content p {
      margin: 0 auto;
      max-width: 720px;
      font-size: 1.1rem;
      color: rgba(255,255,255,0.82);
    }

    nav {
      position: absolute;
      top: 28px;
      left: 0;
      width: 100%;
      z-index: 3;
    }

    nav .container {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    nav a {
      padding: 10px 18px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.88);
      font-size: 0.98rem;
      transition: 0.25s ease;
      backdrop-filter: blur(6px);
    }

    nav a:hover,
    nav a.active {
      background: rgba(255,255,255,0.16);
      border-color: rgba(255,255,255,0.35);
      transform: translateY(-2px);
    }

    main {
      padding: 90px 0 100px;
      background: linear-gradient(to bottom, #111216, #18191d);
    }

    .intro-box {
      max-width: 820px;
      margin: 0 auto;
      text-align: center;
      padding: 40px 30px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    }

    .intro-box h2 {
      margin-top: 0;
      margin-bottom: 14px;
      font-size: 2rem;
      font-weight: 400;
    }

    .intro-box p {
      margin: 0;
      color: rgba(255,255,255,0.72);
    }

    footer {
      text-align: center;
      padding: 30px 20px;
      color: rgba(255,255,255,0.45);
      background: #0c0d10;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    @media (max-width: 900px) {
      header {
        min-height: 780px;
      }

      .hero-content h1 {
        font-size: 2.7rem;
        letter-spacing: 5px;
      }

      .hero-content p {
        font-size: 1rem;
      }

      nav {
        top: 20px;
      }

      nav a {
        font-size: 0.92rem;
        padding: 9px 15px;
      }

      .intro-box {
        padding: 32px 20px;
      }
    }
  </style>
</head>
<body>

  <header>
    <video class="hero-video" autoplay muted loop playsinline>
      <source src="22.mp4" type="video/mp4">
      브라우저가 video 태그를 지원하지 않습니다.
    </video>
    <div class="overlay"></div>

    <nav>
      <div class="container">
        <a href="index.html" class="active">홈</a>
        <a href="music.html">오선지</a>
        <a href="poet.html">원고지</a>
        <a href="contact.html">도화지</a>
        <a href="board.html" target="_blank">방명록</a>
      </div>
    </nav>

    <div class="hero-content">
      <h1>museline</h1>
      <div class="hero-line"></div>
      <p>음악과 감성이 조용히 머무는 곳. 한 줄의 선율과 한 편의 문장이 같은 온도로 숨 쉬는 공간입니다.</p>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="intro-box">
        <h2>느리게 머무는 감성의 기록</h2>
        <p>
          이곳은 음악, 문장, 그리고 여백이 서로를 방해하지 않고 자연스럽게 스며드는 작은 공간입니다.
        </p>
      </div>
    </div>
  </main>

  <footer>
    <p>© 2026 museline. All Rights Reserved.</p>
  </footer>

</body>
</html>
