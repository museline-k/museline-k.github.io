<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>추미정의 오선지와 원고지</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      background: linear-gradient(to bottom, #fffdf8, #f8f4ec);
      color: #4b4036;
      line-height: 1.8;
    }

    a {
      color: #7a4e2d;
      text-decoration: none;
    }

    a:hover {
      color: #b06d3b;
    }

    .container {
      width: 90%;
      max-width: 1100px;
      margin: 0 auto;
    }

    header {
      position: relative;
      min-height: 520px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      color: #fff;
      background: #d8c2a8;
    }

    .hero-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
      background:
        linear-gradient(
          to bottom,
          rgba(90, 60, 35, 0.25),
          rgba(120, 85, 55, 0.40)
        );
    }

    header .container {
      position: relative;
      z-index: 2;
      padding: 0 20px 40px;
      align-self: flex-end;
    }

    header h1 {
      margin: 0;
      font-size: 3.4rem;
      letter-spacing: 1px;
      text-shadow: 0 4px 18px rgba(0, 0, 0, 0.30);
    }

    header p {
      margin: 18px auto 0;
      max-width: 760px;
      color: #fffaf5;
      font-size: 1.1rem;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.22);
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255, 250, 244, 0.92);
      border-bottom: 1px solid rgba(122, 78, 45, 0.12);
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.04);
    }

    nav .container {
      display: flex;
      justify-content: center;
      gap: 14px;
      padding: 16px 0;
      flex-wrap: wrap;
    }

    nav a {
      font-weight: 600;
      color: #6a4026;
      padding: 12px 22px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(180, 135, 92, 0.25);
      box-shadow: 0 4px 10px rgba(106, 64, 38, 0.08);
      transition: all 0.2s ease;
      font-size: 1.1rem;
    }

    nav a:hover {
      background: linear-gradient(135deg, #e2af72, #f6d7a7);
      color: #4a321f;
      transform: translateY(-2px);
    }

    nav a.active {
      background: linear-gradient(135deg, #d9a15f, #f0c98c);
      color: #4a321f;
      font-weight: bold;
    }

    .empty-space {
      min-height: 420px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .empty-space p {
      margin: 0;
      color: #9a8575;
      font-size: 1.05rem;
    }

    footer {
      text-align: center;
      padding: 40px 20px;
      color: #8b7768;
      background: #f4ede4;
    }

    @media (max-width: 900px) {
      header {
        min-height: 400px;
      }

      header h1 {
        font-size: 2.3rem;
      }

      header p {
        font-size: 1rem;
      }

      .empty-space {
        min-height: 320px;
        padding: 0 20px;
      }

      nav a {
        font-size: 1rem;
        padding: 10px 18px;
      }
    }
  </style>
</head>
<body>
  <header>
    <video class="hero-video" autoplay muted loop playsinline>
      <source src="header-video.mp4" type="video/mp4">
      브라우저가 video 태그를 지원하지 않습니다.
    </video>
    <div class="hero-overlay"></div>

    <div class="container">
      <h1>추미정의 오선지와 원고지</h1>
      <p>
        음악과 시, 그리고 감정의 결을 따라
        한 줄의 가사와 한 편의 문장이 머무는 공간입니다.
      </p>
    </div>
  </header>

  <nav>
    <div class="container">
      <a href="index.html" class="active">홈</a>
      <a href="music.html">음악</a>
      <a href="poet.html">시</a>
      <a href="board.html" target="_blank">방명록</a>
      <a href="contact.html">연락</a>
    </div>
  </nav>

  <main class="empty-space">
    <div class="container">
      <p></p>
    </div>
  </main>

  <footer>
    <p>© 2026 추미정의 오선지와 원고지. All Rights Reserved.</p>
  </footer>
</body>
</html>
