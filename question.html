<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>질문방 | 뮤즈라인</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      color: #4b4036;
      line-height: 1.7;
      background:
        linear-gradient(to bottom, rgba(255,253,248,0.96), rgba(248,244,236,0.98)),
        repeating-linear-gradient(
          to bottom,
          rgba(170, 140, 110, 0.08) 0px,
          rgba(170, 140, 110, 0.08) 1px,
          transparent 1px,
          transparent 36px
        );
      min-height: 100vh;
    }

    a {
      color: #7a4e2d;
      text-decoration: none;
    }

    a:hover {
      color: #b06d3b;
    }

    .container {
      width: 90%;
      max-width: 980px;
      margin: 0 auto;
      padding: 50px 0 70px;
    }

    .hero {
      text-align: center;
      margin-bottom: 28px;
      position: relative;
    }

    .music-note {
      font-size: 1.3rem;
      color: #b07a4d;
      opacity: 0.75;
      letter-spacing: 10px;
      margin-bottom: 10px;
    }

    h1 {
      text-align: center;
      color: #6a4026;
      margin: 0 0 10px;
      font-size: 2.3rem;
      letter-spacing: 0.02em;
    }

    .sub-text {
      text-align: center;
      color: #7c6a5d;
      margin-bottom: 0;
      font-size: 1rem;
    }

    .board-wrap {
      background: rgba(255, 255, 255, 0.90);
      border: 1px solid rgba(180, 135, 92, 0.18);
      border-radius: 22px;
      box-shadow: 0 14px 30px rgba(106, 64, 38, 0.10);
      padding: 32px 28px;
      position: relative;
      overflow: hidden;
    }

    .board-wrap::before {
      content: "♪ ♫";
      position: absolute;
      top: 14px;
      right: 18px;
      font-size: 1.2rem;
      color: rgba(176, 109, 59, 0.18);
      pointer-events: none;
    }

    .board-wrap::after {
      content: "♩";
      position: absolute;
      bottom: 14px;
      left: 18px;
      font-size: 1.4rem;
      color: rgba(176, 109, 59, 0.14);
      pointer-events: none;
    }

    .disqus-note {
      text-align: center;
      color: #8b7768;
      font-size: 0.95rem;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px dashed rgba(176, 109, 59, 0.25);
    }

        footer {
      text-align: center;
      padding: 30px 20px 40px;
      color: #8b7768;
      font-size: 0.95rem;
    }

    @media (max-width: 768px) {
      .container {
        width: 92%;
        padding: 35px 0 50px;
      }

      h1 {
        font-size: 1.8rem;
      }

      .music-note {
        font-size: 1.1rem;
        letter-spacing: 6px;
      }

      .board-wrap {
        padding: 20px 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <div class="music-note">♪ ♫ ♩</div>
      <h1>뮤즈라인 질문방</h1>
      <p class="sub-text">음악처럼 편안하게, 자유롭게 질문을 남겨주세요.</p>
    </div>

    <div class="board-wrap">
      <p class="disqus-note">
        아래 댓글 영역에서 로그인 후 자유롭게 글을 남기실 수 있습니다.
      </p>

      <div id="disqus_thread"></div>

      <script>
        var disqus_config = function () {
          this.page.url = 'https://museline.github.io/question.html';
          this.page.identifier = 'museline-guestbook';
          this.page.title = '뮤즈라인 방명록';
        };

        (function() {
          var d = document, s = d.createElement('script');
          s.src = 'https://CHUMIJUNG.disqus.com/embed.js';
          s.setAttribute('data-timestamp', +new Date());
          (d.head || d.body).appendChild(s);
        })();
      </script>

      <noscript>
        JavaScript를 활성화해야 질문방을 볼 수 있습니다.
      </noscript>
    </div>

    
  </div>

  <footer>
    <p>© 2026 뮤즈라인. All Rights Reserved.</p>
  </footer>
</body>
</html>
